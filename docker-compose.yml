version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: useclever_postgres
    environment:
      POSTGRES_USER: useclever
      POSTGRES_PASSWORD: useclever_password
      POSTGRES_DB: useclever
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U useclever -d useclever"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
