name: Deploy to Railway

on:
  push:
    branches: [main]
  workflow_dispatch:  # Manual trigger

env:
  NODE_VERSION: '20'

jobs:
  # Optional: Additional verification before Railway auto-deploy
  pre-deploy-checks:
    runs-on: ubuntu-latest
    name: Pre-Deployment Checks
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify environment variables
        run: |
          echo "Checking required Railway environment variables..."
          if [ -z "${{ secrets.RAILWAY_PROJECT_ID }}" ]; then
            echo "⚠️  Warning: RAILWAY_PROJECT_ID not set in secrets"
          fi
          echo "✓ Pre-deployment checks complete"

      - name: Build verification
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

  # Optional: Notify deployment status
  notify-deployment:
    runs-on: ubuntu-latest
    name: Notify Deployment
    needs: pre-deploy-checks
    if: success()

    steps:
      - name: Deployment notification
        run: |
          echo "🚀 Deployment to Railway initiated"
          echo "Railway will auto-build and deploy your app"
          echo "Monitor at: https://railway.app"

      - name: Comment on commit
        if: github.event_name == 'push'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: '🚀 Deploying to Railway...\n\nRailway will automatically build from the Dockerfile and deploy your application.\n\nCheck deployment status at: https://railway.app'
            })

  # Optional: Manual Railway deployment trigger (requires Railway token)
  deploy-railway:
    runs-on: ubuntu-latest
    name: Trigger Railway Deployment
    needs: pre-deploy-checks
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Railway (manual trigger)
        if: env.RAILWAY_TOKEN != ''
        run: |
          # Optional: Use Railway CLI to trigger deployment
          echo "ℹ️  Railway auto-deploys on push"
          echo "No manual trigger needed - Railway webhook detected the push"
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        continue-on-error: true
