name: Deploy to Railway

on:
  push:
    branches: [main]
  workflow_dispatch:  # Manual trigger

env:
  NODE_VERSION: '22'

jobs:
  # Additional verification before Railway auto-deploy
  pre-deploy-checks:
    runs-on: ubuntu-latest
    name: Pre-Deployment Checks
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify environment variables
        run: |
          echo "Checking required Railway environment variables..."
          if [ -z "${{ secrets.RAILWAY_PROJECT_ID }}" ]; then
            echo "⚠️  Warning: RAILWAY_PROJECT_ID not set in secrets"
          fi
          echo "✓ Pre-deployment checks complete"

      - name: Build verification
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

  # Notify deployment status
  notify-deployment:
    runs-on: ubuntu-latest
    name: Notify Deployment
    needs: pre-deploy-checks
    if: success()
    timeout-minutes: 5

    steps:
      - name: Deployment notification
        run: |
          echo "🚀 Deployment to Railway initiated"
          echo "Railway will auto-build and deploy your app"
          echo "Monitor at: https://railway.app"

      - name: Comment on commit
        if: github.event_name == 'push'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: '🚀 Deploying to Railway...\n\nRailway will automatically build from the Dockerfile and deploy your application.\n\nCheck deployment status at: https://railway.app'
            })

  # Deploy to Railway
  deploy-railway:
    runs-on: ubuntu-latest
    name: Trigger Railway Deployment
    needs: pre-deploy-checks
    if: github.ref == 'refs/heads/main'
    environment: production
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        if: "${{ secrets.RAILWAY_TOKEN != '' }}"
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        if: "${{ secrets.RAILWAY_TOKEN != '' }}"
        run: railway deploy
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Deployment status
        if: "${{ secrets.RAILWAY_TOKEN == '' }}"
        run: echo "⚠️ RAILWAY_TOKEN not configured - Railway auto-deploy on push enabled"
